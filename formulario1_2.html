<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
</head>
<body>
    <form action="">
        <h2>ingrese sus datos </h2>
        <label for="">Ingrese su nombre</label>
        <br>
        <input type="text" placeholder="Ingrese su nombre" required>
        <br>
        <label for="">ingrese su apellido</label>
        <br>
        <input type="text" placeholder="Ingrese su apellido" required>
        <br>
        <label for="">numero de documento</label>
        <br>
            <select name="" id="">
                <option value="cc" disabled>tipo</option>
                <option value="cc">C.C</option>
                <option value="ti">T.I</option>
                <option value="ce">Otro</option>
            </select>
        <input type="number" placeholder="Ingrese su numero de documento" required>
        <br>
        <label for="">correo electronico</label>
        <br>
        <input type="email" placeholder="Ingrese su correo electronico" required>
        <br>
        <label for="">numero de telefono</label>
        <br>
        <input type="tel" placeholder="Ingrese su numero de telefono" required>
        <br>
        <label for="">direccion</label>
        <br>
        <input type="text" placeholder="Ingrese su direccion" required>
        <br>
        <label for="">fecha de nacimiento</label>
        <br>
        <input type="date" required>
        <br>
        <label for="">edad</label>
        <br>
        <input type="number" placeholder="Ingrese su edad" required>
        <br>
        <label for="">genero</label>
        <br>
        <input type="checkbox" name="" id="">mujer
        <input type="checkbox" name="" id="">hombre
        <input type="checkbox" name="" id="">otro
        <br>
        <label for="">preferencia</label>
        <br>
        <select name="" id="">
            <optgroup>
                <option value="futbol">futbol</option>
                <option value="baloncesto">baloncesto</option>
                <option value="tenis">tenis</option>
                <option value="natacion">natacion</option>
            </optgroup>
        </select>
        <br>
        <label for="">comentarios</label>
        <br>
        <textarea name="" id="" placeholder="Ingrese sus comentarios" required></textarea>
        <br>
        <button type="submit">enviar</button>
    </form>
</body>
</html>
